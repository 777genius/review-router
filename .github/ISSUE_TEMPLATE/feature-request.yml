name: Feature request
about: Suggest a product or workflow improvement
title: "Feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow is painful or missing?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should ReviewRouter do differently?
    validations:
      required: true
  - type: dropdown
    id: audience
    attributes:
      label: Who benefits?
      options:
        - Individual repository users
        - Organization admins
        - Maintainers reviewing PRs
        - Security/compliance teams
        - Other
