name: ReviewRouter Interaction Reusable

on:
  workflow_call:
    inputs:
      runtime_ref:
        description: 'ReviewRouter runtime ref: main, v1, v1.x.x, or a 40-char commit SHA'
        required: false
        type: string
        default: main
      api_url:
        description: 'ReviewRouter API URL used for OIDC runtime config and App comment tokens'
        required: false
        type: string
        default: https://api.reviewrouter.site
      runtime_config_mode:
        description: 'Runtime config mode: oidc or static'
        required: false
        type: string
        default: oidc
      review_app_client_id:
        description: 'Optional user-owned GitHub App client ID for static-mode bot comments'
        required: false
        type: string
        default: ''
      review_app_repository:
        description: 'Repository name used when minting a static-mode user-owned GitHub App token'
        required: false
        type: string
        default: ''
      review_workflow_file:
        description: 'Review workflow file name to rerun after an accepted /rr skip'
        required: false
        type: string
        default: reviewrouter.yml
      discussion_mode:
        description: 'AI discussion mode: off or suggest'
        required: false
        type: string
        default: off
      discussion_model:
        description: 'Codex model used for AI discussion replies'
        required: false
        type: string
        default: gpt-5.5
      discussion_reasoning_effort:
        description: 'Codex reasoning effort for AI discussion replies: low, medium, high, or xhigh'
        required: false
        type: string
        default: medium
      discussion_max_per_pr:
        description: 'Maximum AI discussion replies per pull request'
        required: false
        type: string
        default: '20'
      discussion_max_per_thread:
        description: 'Maximum AI discussion replies per ReviewRouter finding thread'
        required: false
        type: string
        default: '5'
      discussion_timeout_seconds:
        description: 'Timeout for AI discussion replies'
        required: false
        type: string
        default: '60'
    secrets:
      REVIEW_APP_PRIVATE_KEY:
        required: false
      REVIEW_ROUTER_LEDGER_KEY:
        required: false
      CODEX_AUTH_JSON:
        required: false
      CODEX_CONFIG_TOML:
        required: false
      OPENAI_API_KEY:
        required: false

jobs:
  interaction:
    name: interaction
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      RR_RUNTIME_REF: ${{ inputs.runtime_ref }}
      REVIEWROUTER_API_URL: ${{ inputs.api_url }}
      REVIEWROUTER_OIDC_AUDIENCE: reviewrouter
      REVIEWROUTER_RUNTIME_CONFIG_MODE: ${{ inputs.runtime_config_mode }}
      REVIEWROUTER_STATIC_CONFIG_FALLBACK: 'true'
      RR_REVIEW_WORKFLOW_FILE: ${{ inputs.review_workflow_file }}
      REVIEW_APP_PRIVATE_KEY_PRESENT: ${{ secrets.REVIEW_APP_PRIVATE_KEY != '' && '1' || '0' }}
      CODEX_AUTH_JSON_PRESENT: ${{ secrets.CODEX_AUTH_JSON != '' && '1' || '0' }}
      OPENAI_API_KEY_PRESENT: ${{ secrets.OPENAI_API_KEY != '' && '1' || '0' }}
    steps:
      - name: Prepare ReviewRouter runtime settings
        id: runtime
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const fail = (message) => {
            console.error(`::error::${message}`);
            process.exit(1);
          };
          const runtimeRef = (process.env.RR_RUNTIME_REF || '').trim();
          if (!/^(main|v1|v1\.[0-9]+\.[0-9]+|[a-fA-F0-9]{40})$/.test(runtimeRef)) {
            fail('Invalid ReviewRouter runtime_ref. Use main, v1, v1.x.x, or a 40-character commit SHA.');
          }
          const runtimeConfigMode = (process.env.REVIEWROUTER_RUNTIME_CONFIG_MODE || '').trim();
          if (!['oidc', 'static'].includes(runtimeConfigMode)) {
            fail('Invalid ReviewRouter runtime_config_mode. Use oidc or static.');
          }
          const reviewWorkflowFile = (process.env.RR_REVIEW_WORKFLOW_FILE || '').trim();
          if (!/^(reviewrouter|review-router)\.ya?ml$/.test(reviewWorkflowFile)) {
            fail('Invalid review_workflow_file. Use reviewrouter.yml or review-router.yml.');
          }
          const discussionMode = (process.env.RR_DISCUSSION_MODE || 'off').trim().toLowerCase();
          if (!['off', 'suggest', ''].includes(discussionMode)) {
            fail('Invalid discussion_mode. Use off or suggest.');
          }
          const discussionEffort = (process.env.RR_DISCUSSION_REASONING_EFFORT || '').trim().toLowerCase();
          if (discussionEffort && !['low', 'medium', 'high', 'xhigh'].includes(discussionEffort)) {
            fail('Invalid discussion_reasoning_effort. Use low, medium, high, or xhigh.');
          }
          const githubEnv = process.env.GITHUB_ENV;
          const githubOutput = process.env.GITHUB_OUTPUT;
          if (!githubEnv || !githubOutput) {
            fail('GitHub environment files are unavailable.');
          }
          fs.appendFileSync(githubEnv, `REVIEWROUTER_ACTION_VERSION=${runtimeRef}\n`);
          fs.appendFileSync(githubEnv, `REVIEW_ROUTER_REVIEW_WORKFLOW_FILE=${reviewWorkflowFile}\n`);
          fs.appendFileSync(
            githubEnv,
            `REVIEWROUTER_COMMENT_TOKEN_MODE=${runtimeConfigMode === 'oidc' ? 'app-oidc' : 'github-token'}\n`
          );
          fs.appendFileSync(githubOutput, `runtime_ref=${runtimeRef}\n`);
          fs.appendFileSync(
            githubOutput,
            `app_token_needed=${runtimeConfigMode === 'static' && process.env.REVIEW_APP_PRIVATE_KEY_PRESENT === '1' && (process.env.RR_REVIEW_APP_CLIENT_ID || '').trim().length > 0 ? 'true' : 'false'}\n`
          );
          const codexCliNeeded =
            discussionMode === 'suggest' &&
            (process.env.CODEX_AUTH_JSON_PRESENT === '1' || process.env.OPENAI_API_KEY_PRESENT === '1');
          fs.appendFileSync(githubOutput, `codex_cli_needed=${codexCliNeeded ? 'true' : 'false'}\n`);
          NODE
        env:
          RR_REVIEW_APP_CLIENT_ID: ${{ inputs.review_app_client_id }}
          RR_DISCUSSION_MODE: ${{ inputs.discussion_mode }}
          RR_DISCUSSION_REASONING_EFFORT: ${{ inputs.discussion_reasoning_effort }}

      - name: Checkout ReviewRouter runtime
        uses: actions/checkout@v6
        with:
          repository: 777genius/review-router
          ref: ${{ steps.runtime.outputs.runtime_ref }}
          path: .reviewrouter-runtime
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Create ReviewRouter GitHub App token
        id: app-token
        if: ${{ steps.runtime.outputs.app_token_needed == 'true' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ inputs.review_app_client_id }}
          private-key: ${{ secrets.REVIEW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ inputs.review_app_repository }}
          permission-actions: write
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - name: Preflight ReviewRouter interaction
        id: preflight
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          REVIEW_ROUTER_MODE: interaction-preflight
          REVIEW_ROUTER_DISCUSSION_MODE: ${{ inputs.discussion_mode }}
        run: node .reviewrouter-runtime/dist/index.js

      - name: Install official Codex CLI for discussion replies
        if: ${{ steps.preflight.outputs.needs_discussion == 'true' && steps.runtime.outputs.codex_cli_needed == 'true' }}
        shell: bash
        run: npm install -g @openai/codex@0.125.0

      - name: Restore Codex OAuth config for discussion replies
        if: ${{ steps.preflight.outputs.needs_discussion == 'true' && env.CODEX_AUTH_JSON_PRESENT == '1' }}
        shell: bash
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          CODEX_CONFIG_TOML: ${{ secrets.CODEX_CONFIG_TOML }}
        run: |
          set -euo pipefail
          if [ -z "${CODEX_AUTH_JSON:-}" ]; then
            echo "::error::CODEX_AUTH_JSON secret is missing. reseed auth.json from a trusted machine or switch this repository to OpenAI API-key mode."
            exit 1
          fi
          node <<'NODE'
          const payload = process.env.CODEX_AUTH_JSON || '';
          const fail = (message) => {
            console.error('::error::' + message);
            process.exit(1);
          };
          let auth;
          try {
            auth = JSON.parse(payload);
          } catch (error) {
            fail('CODEX_AUTH_JSON is not valid JSON. reseed auth.json from a trusted machine. ' + error.message);
          }
          if (auth.auth_mode !== 'chatgpt') {
            fail('CODEX_AUTH_JSON auth_mode must be chatgpt. reseed auth.json with Codex CLI subscription login or switch this repo to OpenAI API-key mode.');
          }
          if (!auth.tokens || typeof auth.tokens.refresh_token !== 'string' || auth.tokens.refresh_token.length === 0) {
            fail('CODEX_AUTH_JSON tokens.refresh_token is missing. Run codex login on a trusted machine and reseed auth.json.');
          }
          NODE
          export CODEX_HOME="${CODEX_HOME:-$HOME/.codex}"
          mkdir -p "$CODEX_HOME"
          chmod 700 "$CODEX_HOME"
          printf '%s' "$CODEX_AUTH_JSON" > "$CODEX_HOME/auth.json"
          chmod 600 "$CODEX_HOME/auth.json"
          if [ -n "${CODEX_CONFIG_TOML:-}" ]; then
            printf '%s' "$CODEX_CONFIG_TOML" > "$CODEX_HOME/config.toml"
            chmod 600 "$CODEX_HOME/config.toml"
          fi

      - name: Run ReviewRouter interaction
        if: ${{ steps.preflight.outputs.should_run == 'true' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          REVIEW_ROUTER_MODE: interaction
          REVIEW_ROUTER_LEDGER_KEY: ${{ secrets.REVIEW_ROUTER_LEDGER_KEY }}
          REVIEW_ROUTER_DISCUSSION_MODE: ${{ inputs.discussion_mode }}
          REVIEW_ROUTER_DISCUSSION_MAX_PER_PR: ${{ inputs.discussion_max_per_pr }}
          REVIEW_ROUTER_DISCUSSION_MAX_PER_THREAD: ${{ inputs.discussion_max_per_thread }}
          REVIEW_ROUTER_DISCUSSION_TIMEOUT_SECONDS: ${{ inputs.discussion_timeout_seconds }}
          CODEX_MODEL: ${{ inputs.discussion_model }}
          CODEX_REASONING_EFFORT: ${{ inputs.discussion_reasoning_effort }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node .reviewrouter-runtime/dist/index.js
