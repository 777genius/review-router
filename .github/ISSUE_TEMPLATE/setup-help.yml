name: Setup help
about: Installation, setup PR, provider secret, or dashboard onboarding issue
title: "Setup help: "
labels: [setup, support]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Do not paste Codex auth JSON, API keys, GitHub tokens, private code, or full PR diffs.
  - type: input
    id: repository
    attributes:
      label: Repository
      description: owner/repo, if public or safe to share.
      placeholder: owner/repo
    validations:
      required: true
  - type: input
    id: setup_pr
    attributes:
      label: Setup pull request URL
      placeholder: https://github.com/owner/repo/pull/123
  - type: dropdown
    id: provider
    attributes:
      label: Provider mode
      options:
        - Codex subscription OAuth
        - Codex API key
        - OpenRouter API key
        - Not sure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the step that failed and the visible error category/message.
      placeholder: Setup PR was created, but workflow health says provider_auth_missing.
    validations:
      required: true
  - type: textarea
    id: safe_links
    attributes:
      label: Safe links
      description: Add PR/workflow run links only. Do not paste secrets or private logs.
      placeholder: |
        Pull request: https://github.com/owner/repo/pull/123
        Workflow run: https://github.com/owner/repo/actions/runs/123456
  - type: textarea
    id: changed
    attributes:
      label: What changed recently?
      placeholder: Setup PR merged, CODEX_AUTH_JSON reseeded, model changed, repo renamed, App access changed.
