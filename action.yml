name: "ReviewRouter"
description: "ReviewRouter pull request reviewer that posts summaries, inline findings, and optional merge-blocking checks"
author: "Keith Herrington"
branding:
  icon: "check-circle"
  color: "blue"

inputs:
  GITHUB_TOKEN:
    description: "GitHub token"
    required: true
  PR_NUMBER:
    description: "Pull request number"
    required: false
  REVIEW_ROUTER_MODE:
    description: "Execution mode: review or interaction"
    required: false
    default: "review"
  REVIEW_ROUTER_LEDGER_KEY:
    description: "HMAC key used to verify the signed override ledger"
    required: false
  REVIEW_ROUTER_ALLOW_AUTHOR_SKIP:
    description: "Allow PR authors to skip blocking findings"
    required: false
    default: "false"
  REVIEW_ROUTER_REVIEW_WORKFLOW_FILE:
    description: "Review workflow file name used when rerunning failed jobs after /rr commands"
    required: false
    default: "review-router.yml"
  REVIEW_ROUTER_DISCUSSION_MODE:
    description: "AI discussion mode for human replies to ReviewRouter inline findings: off or suggest"
    required: false
    default: "off"
  REVIEW_ROUTER_DISCUSSION_MAX_PER_PR:
    description: "Maximum AI discussion replies per pull request"
    required: false
    default: "20"
  REVIEW_ROUTER_DISCUSSION_MAX_PER_THREAD:
    description: "Maximum AI discussion replies per ReviewRouter finding thread"
    required: false
    default: "5"
  REVIEW_ROUTER_DISCUSSION_TIMEOUT_SECONDS:
    description: "Timeout for AI discussion replies"
    required: false
    default: "60"
  REVIEW_PROVIDERS:
    description: |
      Comma-separated provider list (e.g., "openrouter/model1,opencode/model2").

      BEHAVIOR CHANGE (v0.2.0+):
      - Previously: Defaulted to specific hardcoded providers
      - Now: Defaults to empty string (enables dynamic discovery)

      DEFAULT (empty): Uses provider discovery from configured credentials and available CLIs.
      For the hardened Codex setup, prefer setting CODEX_MODEL and leaving this empty.

      CUSTOM: Override discovery with specific providers. Disables automatic fallback chain.
      Use when you need specific models or want predictable provider selection.
    required: false
    default: ""
  FALLBACK_PROVIDERS:
    description: |
      Comma-separated fallback providers used when primary providers fail.
      DEFAULT (empty): Uses automatic fallback discovery (same mechanism as REVIEW_PROVIDERS).
      CUSTOM: Override with specific fallback models.
      Only used when REVIEW_PROVIDERS is also set (custom mode).
    required: false
    default: ""
  SYNTHESIS_MODEL:
    description: "Model used for synthesis/prompts"
    required: false
    default: ""
  CODEX_MODEL:
    description: "Codex model id without provider prefix, for example gpt-5.5. If REVIEW_PROVIDERS is empty, this becomes codex/<model>."
    required: false
    default: ""
  INLINE_MAX_COMMENTS:
    description: "Maximum inline comments"
    required: false
    default: "5"
  INLINE_MIN_SEVERITY:
    description: "Minimum severity for inline comments"
    required: false
    default: "major"
  INLINE_MIN_AGREEMENT:
    description: "Providers required to agree"
    required: false
    default: "1"
  MIN_CHANGED_LINES:
    description: "Skip if below this line count"
    required: false
    default: "0"
  MAX_CHANGED_FILES:
    description: "Skip if over this file count"
    required: false
    default: "0"
  SKIP_LABELS:
    description: "Comma-separated labels to skip"
    required: false
    default: ""
  PROVIDER_LIMIT:
    description: "Limit number of providers to rotate"
    required: false
    default: "1"
  PROVIDER_RETRIES:
    description: "Retries per provider"
    required: false
    default: "0"
  PROVIDER_MAX_PARALLEL:
    description: "Maximum providers to run in parallel"
    required: false
    default: "1"
  CODEX_HEALTHCHECK_MODE:
    description: "Codex provider health check mode: exec, binary, or none"
    required: false
    default: "binary"
  CODEX_HEALTHCHECK_REASONING_EFFORT:
    description: "Codex reasoning effort used for health checks"
    required: false
    default: "low"
  CODEX_REASONING_EFFORT:
    description: "Optional Codex reasoning effort override for review runs"
    required: false
    default: ""
  CODEX_AGENTIC_CONTEXT:
    description: "Allow Codex CLI to inspect related repository files in read-only sandbox before returning JSON findings"
    required: false
    default: "true"
  CODEX_EVENT_AUDIT:
    description: "Log a sanitized summary of Codex CLI tool commands and file path counts"
    required: false
    default: "false"
  FAIL_ON_NO_HEALTHY_PROVIDERS:
    description: "Fail the action if no provider passes health checks"
    required: false
    default: "true"
  DIFF_MAX_BYTES:
    description: "Maximum diff bytes to send to providers"
    required: false
    default: "120000"
  SMART_DIFF_COMPACTION:
    description: "Replace large/generated/lock diffs with compact summaries in the prompt while keeping changed source diffs reviewable"
    required: false
    default: "true"
  MAX_FULL_DIFF_FILE_BYTES:
    description: "Maximum per-file diff bytes kept verbatim before smart diff compaction"
    required: false
    default: "40000"
  MAX_FULL_DIFF_FILE_CHANGES:
    description: "Maximum per-file changed lines kept verbatim before smart diff compaction"
    required: false
    default: "800"
  ENABLE_TOKEN_AWARE_BATCHING:
    description: "Split review batches using estimated prompt token size"
    required: false
    default: "true"
  TARGET_TOKENS_PER_BATCH:
    description: "Approximate target prompt tokens per review batch"
    required: false
    default: "50000"
  RUN_TIMEOUT_SECONDS:
    description: "Timeout per provider run"
    required: false
    default: "600"
  BUDGET_MAX_USD:
    description: "Budget guard in USD"
    required: false
    default: "0"
  ENABLE_AST_ANALYSIS:
    description: "Enable AST analysis"
    required: false
    default: "true"
  ENABLE_SECURITY:
    description: "Enable security scan"
    required: false
    default: "true"
  ENABLE_CACHING:
    description: "Enable caching of findings"
    required: false
    default: "true"
  ENABLE_TEST_HINTS:
    description: "Enable test coverage hints"
    required: false
    default: "true"
  ENABLE_AI_DETECTION:
    description: "Enable AI-generated code detection"
    required: false
    default: "false"
  INCREMENTAL_ENABLED:
    description: "Enable incremental review (only review changed files on PR updates)"
    required: false
    default: "true"
  INCREMENTAL_CACHE_TTL_DAYS:
    description: "Days to keep incremental review cache"
    required: false
    default: "7"
  LEARNING_ENABLED:
    description: "Enable feedback learning system"
    required: false
    default: "false"
  LEARNING_MIN_FEEDBACK_COUNT:
    description: "Minimum feedback count before adjusting confidence"
    required: false
    default: "5"
  QUIET_USE_LEARNING:
    description: "Use learned confidence thresholds in quiet mode"
    required: false
    default: "true"
  QUIET_MIN_CONFIDENCE:
    description: "Minimum confidence threshold for quiet mode filtering (0.0-1.0)"
    required: false
    default: "0.5"
  MIN_CONFIDENCE:
    description: "Minimum confidence threshold for inline suggestions (0.0-1.0)"
    required: false
    default: ""
  CONSENSUS_REQUIRED_FOR_CRITICAL:
    description: "Require provider consensus before posting critical inline suggestions"
    required: false
    default: "false"
  CONSENSUS_MIN_AGREEMENT:
    description: "Minimum provider count required for critical suggestion consensus"
    required: false
    default: "2"
  SUGGESTION_SYNTAX_VALIDATION:
    description: "Validate suggestion syntax before posting GitHub suggestion blocks"
    required: false
    default: "true"
  UPDATE_PR_DESCRIPTION:
    description: "Append/update a ReviewRouter summary block in the pull request description without overwriting author text"
    required: false
    default: "true"
  FAIL_ON_CRITICAL:
    description: "Fail the check when critical findings exist"
    required: false
    default: "true"
  FAIL_ON_MAJOR:
    description: "Fail the check when major findings exist"
    required: false
    default: "false"
  FAIL_ON_SEVERITY:
    description: "Advanced override for failure threshold: off, critical, major, or minor. When set, overrides FAIL_ON_CRITICAL and FAIL_ON_MAJOR"
    required: false
    default: ""
  GRAPH_ENABLED:
    description: "Enable code graph for dependency tracking"
    required: false
    default: "false"
  GRAPH_CACHE_ENABLED:
    description: "Cache code graph between runs"
    required: false
    default: "true"
  GRAPH_MAX_DEPTH:
    description: "Maximum depth for dependency traversal"
    required: false
    default: "5"
  GRAPH_TIMEOUT_SECONDS:
    description: "Timeout for graph building in seconds"
    required: false
    default: "10"
  REPORT_BASENAME:
    description: "Base name for JSON/SARIF reports"
    required: false
    default: "review-router"
  SKIP_TRIVIAL_CHANGES:
    description: "Skip reviews for trivial changes (dependency locks, docs, config files, test fixtures)"
    required: false
    default: "true"
  SKIP_DEPENDENCY_UPDATES:
    description: "Skip dependency lock file updates (package-lock.json, yarn.lock, etc.)"
    required: false
    default: "true"
  SKIP_DOCUMENTATION_ONLY:
    description: "Skip documentation-only changes (*.md, docs/, README, CHANGELOG)"
    required: false
    default: "true"
  SKIP_FORMATTING_ONLY:
    description: "Skip formatting-only changes (whitespace, indentation)"
    required: false
    default: "false"
  SKIP_TEST_FIXTURES:
    description: "Skip test fixture changes (__fixtures__, __snapshots__, *.snap)"
    required: false
    default: "true"
  SKIP_CONFIG_FILES:
    description: "Skip config file changes (.eslintrc, .prettierrc, .gitignore, .gitattributes, tsconfig.json)"
    required: false
    default: "true"
  SKIP_BUILD_ARTIFACTS:
    description: "Skip build artifact changes (dist/, build/, *.min.js, *.map)"
    required: false
    default: "true"
  TRIVIAL_PATTERNS:
    description: "Custom regex patterns for trivial files (comma-separated)"
    required: false
    default: ""
  PATH_BASED_INTENSITY:
    description: "Enable path-based review intensity (opt-in feature)"
    required: false
    default: "false"
  PATH_INTENSITY_PATTERNS:
    description: "JSON array of path patterns with intensities (e.g., [{\"pattern\":\"src/auth/**\",\"intensity\":\"thorough\"}])"
    required: false
    default: ""
  PATH_DEFAULT_INTENSITY:
    description: "Default review intensity for files that don't match patterns (thorough, standard, light)"
    required: false
    default: "standard"
  DRY_RUN:
    description: "Preview mode - run review without posting to GitHub"
    required: false
    default: "false"
  OPENROUTER_API_KEY:
    description: "API key for OpenRouter"
    required: false

outputs:
  findings_count:
    description: "Number of findings"
  critical_count:
    description: "Critical findings count"
  cost_usd:
    description: "Total API cost in USD when available; Codex OAuth subscription runs may report 0"
  total_cost:
    description: "Total API cost in USD when available (alias for cost_usd)"
  ai_likelihood:
    description: "Average AI-generated likelihood"

runs:
  using: "node24"
  main: "dist/index.js"
