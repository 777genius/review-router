name: ReviewRouter
description: ReviewRouter pull request review runtime.
inputs:
  mode:
    description: Runtime mode. Use codex-oauth-rotating for PR review or codex-oauth-refresh for scheduled refresh.
    required: false
  api-url:
    description: ReviewRouter API URL.
    required: false
  provider-instance-id:
    description: ReviewRouter provider instance id.
    required: false
  workflow-schema-version:
    description: ReviewRouter workflow schema version.
    required: false
    default: "1"
  auth-json:
    description: Codex OAuth auth JSON.
    required: false
  claude-code-oauth-token:
    description: Claude Code OAuth token for hybrid reviews.
    required: false
  openrouter-api-key:
    description: OpenRouter API key for hybrid reviews.
    required: false
runs:
  using: node24
  main: action-dist/index.cjs
